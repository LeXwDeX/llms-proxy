services:
  llms-proxy:
    container_name: llms-proxy
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    image: llms-proxy:latest
    restart: unless-stopped
    environment:
      - SERVER_BIND=0.0.0.0:8000
      - LOG_LEVEL=info
      # - ADMIN_PASSWORD=your-secure-password  # 首次启动时的管理员密码，未设置则随机生成
    ports:
      - 8000:8000
    volumes:
      - ./config:/etc/llms-proxy
      - ./data:/var/lib/llms-proxy
      - ./logs:/var/log/llms-proxy
